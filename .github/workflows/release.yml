name: Release new version

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag commit belongs to main branch
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tag ${GITHUB_REF_NAME} is not pointing to a commit in branch main."
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: plugin
        run: bun install --frozen-lockfile

      - name: Build plugin
        working-directory: plugin
        run: bun run build

      - name: Prepare release assets
        run: |
          mkdir -p /tmp/release-assets

          cp dist/main.js /tmp/release-assets/main.js
          cp dist/manifest.json /tmp/release-assets/manifest.json
          cp dist/versions.json /tmp/release-assets/versions.json

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            /tmp/release-assets/main.js
            /tmp/release-assets/manifest.json
            /tmp/release-assets/versions.json
